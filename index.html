<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Archit Sharma | ArchOS — Interactive Portfolio</title>
<meta name="description" content="Archit Sharma's portfolio, reimagined as ArchOS — an interactive desktop-style experience with real windows, a terminal, a file explorer and more.">
<link rel="icon" type="image/png" href="Assets/android-chrome-512x512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="Assets/os.css">
</head>
<body>

  <!-- Boot sequence -->
  <div id="bootScreen" class="boot-screen" role="status" aria-label="ArchOS is loading">
    <div class="boot-mark">AS</div>
    <h1 class="boot-title">Arch<span>OS</span></h1>
    <p class="boot-tagline">Booting Archit Sharma's Portfolio Environment</p>
    <div class="boot-bar"><div class="boot-bar-fill" id="bootBarFill"></div></div>
    <p class="boot-status" id="bootStatus">Initializing kernel modules&hellip;</p>
  </div>

  <!-- Desktop -->
  <div id="desktop" class="desktop" hidden>
    <canvas id="bgCanvas" class="bg-canvas" aria-hidden="true"></canvas>
    <div class="wallpaper-gradient" id="wallpaperLayer" data-wallpaper="aurora" aria-hidden="true"></div>
    <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

    <!-- Top status bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="brand-btn" id="startBrandBtn" aria-label="Open ArchOS menu"><i class="fa-solid fa-circle-nodes"></i> ArchOS</button>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="searchTriggerBtn" aria-label="Search (Ctrl/Cmd + K)"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="icon-btn" id="notifBtn" aria-label="Notifications" tabindex="-1"><i class="fa-regular fa-bell"></i><span class="notif-dot" id="notifDot" hidden></span></button>
        <span class="topbar-clock" id="topbarDate"></span>
        <span class="topbar-clock strong" id="topbarTime"></span>
      </div>
    </header>

    <!-- Desktop icons (populated by JS) -->
    <div class="desktop-icons" id="desktopIcons"></div>

    <!-- Windows render here -->
    <div class="windows-layer" id="windowsLayer"></div>

    <!-- Ambient music player -->
    <div class="music-player" id="musicPlayer">
      <div class="mp-head">
        <span>Now Playing</span>
        <button class="mp-toggle" id="mpToggleCollapse" aria-label="Collapse player"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      <div class="mp-track" id="mpTrack">Focus Flow</div>
      <div class="mp-artist" id="mpArtist">ArchOS Ambient</div>
      <div class="mp-progress" aria-hidden="true"><div class="mp-progress-fill" id="mpProgressFill"></div></div>
      <div class="mp-controls">
        <button id="mpPrevHint" title="Ambient generative tracks" aria-hidden="true" tabindex="-1"><i class="fa-solid fa-shuffle" style="opacity:.35;"></i></button>
        <button class="mp-play" id="mpPlayBtn" aria-label="Play or pause"><i class="fa-solid fa-play" id="mpPlayIcon"></i></button>
        <button id="mpNextBtn" aria-label="Next track"><i class="fa-solid fa-forward-step"></i></button>
      </div>
      <div class="mp-volume">
        <i class="fa-solid fa-volume-low"></i>
        <input type="range" id="mpVolume" min="0" max="0.6" step="0.02" value="0.16" aria-label="Volume">
      </div>
    </div>

    <!-- Scrim for menus -->
    <div class="scrim" id="scrim" hidden></div>

    <!-- Start menu -->
    <div class="start-menu" id="startMenu" hidden role="menu" aria-label="Start menu">
      <div class="start-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="startSearchInput" placeholder="Search apps, projects, skills…" aria-label="Search ArchOS">
      </div>
      <div>
        <div class="start-section-title" style="margin-bottom:8px;">Pinned</div>
        <div class="start-grid" id="startGrid"></div>
      </div>
      <div>
        <div class="start-section-title" style="margin-bottom:8px;">Recent</div>
        <div class="start-recent" id="startRecent"></div>
      </div>
      <div class="start-power-row">
        <button class="power-btn" id="powerAbout"><i class="fa-solid fa-user"></i> About</button>
        <button class="power-btn" id="powerClassic"><i class="fa-solid fa-clock-rotate-left"></i> Classic Site</button>
        <button class="power-btn" id="powerRefresh"><i class="fa-solid fa-power-off"></i> Reboot</button>
      </div>
    </div>

    <!-- Spotlight search -->
    <div class="spotlight" id="spotlight" hidden role="dialog" aria-label="Global search">
      <div class="spotlight-input-row">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="spotlightInput" placeholder="Search projects, skills, commands…" aria-label="Search">
      </div>
      <div class="spotlight-results" id="spotlightResults"></div>
    </div>

    <!-- Taskbar -->
    <footer class="taskbar">
      <button class="start-btn" id="startBtn" aria-label="Start menu"><i class="fa-solid fa-grip"></i></button>
      <div class="dock" id="dock" aria-label="Pinned applications"></div>
      <div class="taskbar-running" id="taskbarRunning" aria-label="Open windows"></div>
    </footer>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  </div>

  <script src="Assets/os.js"></script>
</body>
</html>
